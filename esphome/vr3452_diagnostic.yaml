# ================================================================
# vr3452_diagnostic_v2.yaml
# ================================================================
# CORRECTED from v1 — two critical fixes based on Taco 00e manual:
#
#   address: 0xF5  (245) — confirmed Taco 00e default, NOT 1
#   baud_rate: 19200   — confirmed Taco 00e default, NOT 9600
#
# PURPOSE: Discover actual register addresses for Head, Flow,
# Power, RPM, and Temperature before deploying production config.
#
# WHAT TO EXPECT:
#   Within 60s of boot, the log will show lines like:
#     [I][scan] INPUT  reg 41 = 131   ← probably Head (1.31 m = 4.3 ft)
#     [I][scan] INPUT  reg 42 = 82    ← probably Flow (8.2 m³/h)
#   Cross-reference with Taco 302-393 manual section 18, pages 43-50.
#
# WIRING (reminder):
#   ESP32 GPIO17 (TX2) → MAX485 DI
#   ESP32 GPIO16 (RX2) → MAX485 RO
#   ESP32 GPIO4        → MAX485 DE + RE (bridged together)
#   MAX485 A           → Pump terminal A
#   MAX485 B           → Pump terminal B
#   MAX485 GND         → Pump terminal SH / GND
#   MAX485 VCC         → ESP32 3.3V
# ================================================================

esphome:
  name: vr3452
  friendly_name: "VR3452 diagnostic v2"
  on_boot:
    priority: -100
    then:
      - logger.log:
          level: INFO
          format: "VR3452 diagnostic v2 — addr=245 baud=19200 — first scan in ~10s"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "VR3452-Fallback"
    password: "vr3452setup"

captive_portal:

logger:
  level: DEBUG
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# ── UART ─────────────────────────────────────────────────────────
# baud_rate: 19200 is the Taco 00e default (confirmed from manual)
# If still no data, try stop_bits: 2
uart:
  id: modbus_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 19200
  data_bits: 8
  parity: NONE
  stop_bits: 1

modbus:
  id: modbus_bus
  uart_id: modbus_uart
  flow_control_pin: GPIO4

# ── Modbus controller ────────────────────────────────────────────
# address: 0xF5 = 245 — Taco 00e default Modbus slave address
# (Can be changed via pump web interface → Network → Modbus settings)
modbus_controller:
  - id: vr3452_pump
    address: 0xF5
    modbus_id: modbus_bus
    setup_priority: -10
    update_interval: 60s
    on_online:
      then:
        - logger.log:
            level: INFO
            format: "Pump ONLINE at address 245 — scanning registers now"
    on_offline:
      then:
        - logger.log:
            level: WARN
            format: "Pump OFFLINE — check wiring. A/B swap is the most common cause."

sensor:

  # ── Input registers (FC4), addresses 0-31 ──────────────────────
  # Pump data registers described as read via FC3 and/or FC4.
  # Scanning both register types to find where data lives.

  - platform: modbus_controller
    modbus_controller_id: vr3452_pump
    name: "SC input 0"
    register_type: read
    address: 0x0000
    value_type: U_WORD
    entity_category: diagnostic
    filters:
      - lambda: |-
          if (x != 0) ESP_LOGI("scan", "INPUT  reg  0 = %.0f", x);
          return x;


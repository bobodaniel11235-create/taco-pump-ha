# ================================================================
# ESPHome secrets.yaml
# Location: /config/esphome/secrets.yaml
#
# Fill in your actual values. Never commit this file to GitHub.
# Add secrets.yaml to your .gitignore.
# ================================================================

wifi_ssid: "YourNetworkName"
wifi_password: "YourWiFiPassword"

# Generate this in the ESPHome dashboard when creating the device.
# It is a 32-byte base64-encoded key — copy it from the dashboard exactly.
api_encryption_key: "REPLACE_WITH_KEY_FROM_ESPHOME_DASHBOARD"

ota_password: "pick_any_strong_password"
